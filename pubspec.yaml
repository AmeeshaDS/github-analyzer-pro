name: flutter_create_github_analyzer
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shimmer: ^3.0.0
  http: ^1.1.0
  fl_chart: ^0.65.0
  pdf: ^3.10.4
  printing: ^5.11.1
  share_plus: ^7.1.0
  get_storage: ^2.1.1
  lottie: ^2.6.0
  intl: ^0.18.1
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#ffffff"

flutter:
  uses-material-design: true